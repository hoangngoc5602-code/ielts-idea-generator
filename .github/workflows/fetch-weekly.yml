name: Fetch IELTS Exam Questions

on:
  schedule:
    # Thu Hai 2:00 UTC = 9:00 sang Viet Nam
    - cron: '0 2 * * 1'
  workflow_dispatch:
    # Cho phep chay thu cong: GitHub -> Actions -> Run workflow

jobs:
  fetch-questions:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ielts-fetcher/package.json

      - name: Install dependencies
        run: npm install
        working-directory: ielts-fetcher

      - name: Run IELTS exam fetcher
        run: node fetch.mjs
        working-directory: ielts-fetcher
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHEET_WEBAPP_URL: ${{ secrets.SHEET_WEBAPP_URL }}
